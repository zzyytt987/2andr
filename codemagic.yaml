workflows:
  build-android-apk:
    name: Build Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      xcode: edge
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Disable iOS (no iOS project)
        script: |
          flutter config --no-enable-ios
      - name: Install dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
      - name: List output
        script: ls -lh build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
